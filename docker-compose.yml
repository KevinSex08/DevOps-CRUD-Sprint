version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: registro_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: backend_api
    restart: always
    environment:
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=registro_db
      - PORT=5000
    depends_on:
      - db
    networks:
      - app_network

  proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
